<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        .hero {
            background-color: #111827;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        .btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #217dbb;
            transform: translateY(-3px);
        }

        .section {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background-color: white;
            border-radius: 12px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input,
        textarea {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        button {
            background-color: #111827;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        button:hover {
            background-color: #1f2937;
            transform: scale(1.03);
        }

        button:disabled {
            background-color: #6b7280;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            display: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>

<body>

    <header class="hero">
        <h1>Hi, I'm Shmuel</h1>
        <p>Fullstack GenAI Student</p>

        <a href="mailto:shanshmuel@gmail.com" class="btn">
            Contact Me
        </a>
    </header>

    <section class="section">
        <h2>Contact</h2>

        <form class="contact-form" action="https://formspree.io/f/mojyldak" method="POST">

            <input type="hidden" name="_subject" value="New message from portfolio">

            <input type="text" name="fullname" placeholder="Full name" required>
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" rows="5" placeholder="Your message" required></textarea>

            <button type="submit" id="submit-btn">Send</button>

            <p id="success-message" class="message success">
                Message sent successfully!
            </p>

            <p id="error-message" class="message error">
                Something went wrong. Please try again.
            </p>

        </form>
    </section>

    <script>
        const form = document.querySelector(".contact-form");
        const submitBtn = document.getElementById("submit-btn");
        const successMessage = document.getElementById("success-message");
        const errorMessage = document.getElementById("error-message");

        form.addEventListener("submit", async function(e) {
            e.preventDefault();

            successMessage.style.display = "none";
            errorMessage.style.display = "none";

            submitBtn.disabled = true;
            submitBtn.textContent = "Sending...";

            const formData = new FormData(form);

            try {
                const response = await fetch(form.action, {
                    method: "POST",
                    body: formData,
                    headers: {
                        "Accept": "application/json"
                    }
                });

                if (response.ok) {
                    successMessage.style.display = "block";
                    form.reset();
                } else {
                    errorMessage.style.display = "block";
                }
            } catch (error) {
                errorMessage.style.display = "block";
            }

            submitBtn.disabled = false;
            submitBtn.textContent = "Send";
        });
    </script>

</body>
</html>
