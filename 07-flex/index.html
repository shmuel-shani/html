<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex-container {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            background-color: #ecf0f1;
            border: 4px solid #2c3e50;
            height: 300px;
            padding: 20px;
            border-radius: 10px;
        }

        .flex-item {
            background-color: #3498db;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            /* width: 25px;
            height: 10%; */
        }

        .tall-employee {
            padding: 70px 30px;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="flex-item">Employee 1</div>
        <div class="flex-item tall-employee">Employee 2</div>
        <div class="flex-item">Employee 3</div>
    </div>
</body>
</html>
