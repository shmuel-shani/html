<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form sheet</title>
</head>

<body>
    <h1>טופס הרשמה לקורס</h1>
    <h2>GENAI</h2>
    <form action="https://formspree.io/f/mojyldak" method="post">
        <div class="form-group">
        </div>
        <div class="form-group">
            <label for="fullname">Full name</label>
            <input type="text" id="fullname" name="fullname">
        </div>
        <div class="form-group">
            <label for="RegDAte">Regis Date</label>
            <input type="date" id="RegDAte" name="RegDAte">
        </div>

        <div class="form-group">
            <label for="emailid">Email</label>
            <input type="email" id="emailid" name="emailid">
        </div>
        <div class="form-group">
            <label for="country">Choose Country</label>
            <select id="country" name="country">
                <option value="israel">ישראל</option>
                <option value="usa">ארצות הברית</option>
                <option value="uk">אנגליה</option>
                <option value="france">צרפת</option>
            </select>
        </div>
        <div class="form-group">
            <button type="submit">Register</button>
            <button type="reset">Clear</button>
        </div>
    </form>
</body>

</html>
