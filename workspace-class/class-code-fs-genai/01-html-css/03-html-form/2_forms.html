<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form sheet</title>
</head>

<body>
    <h1>טופס הרשמה לקורס</h1>
    <h2>GENAI</h2>
    <form action="https://formspree.io/f/mojyldak" method="post">

        <div class="form-group">
            <input type="radio" id="radio-male" name="gender" value="Male">
            <label class="inline-label" for="radio-male">Male</label>

            <input type="radio" id="radio-female" name="gender" value="Female">
            <label class="inline-label" for="radio-female">Female</label>
        </div>

        <div class="form-group">
            <label for="prof-dropdown">Professions</label>

            <select name="profession" id="prof-dropdown">
                <optgroup label="Frontend">
                    <option value="front-html">HTML</option>
                    <option value="front-css">CSS</option>
                </optgroup>

                <optgroup label="Backend">
                    <option value="back-js">JavaScript</option>
                    <option value="back-python">Python</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label for="note-area">Note</label>
            <textarea id="note-area" name="note" rows="5"></textarea>
        </div>

        <button type="submit">Send</button>

    </form>


</body>

</html>
